<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>球队主页</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="nav">
  <a class="brand" href="/index.html">英超赛事信息管理系统</a>
  <a href="/index.html">球队</a>
  <a href="/players.html">球员</a>
  <a href="/matches.html">赛程赛果</a>
  <a href="/standings.html">积分榜</a>
  <a href="/scorers.html">射手榜</a>
  <a href="/player_stats.html">球员统计</a>
</nav>
<main class="container">
  <div id="notice"></div>
  <section id="teamInfo" class="card"></section>

  <h2 class="section-title">本赛季成绩</h2>
  <section id="standing" class="card"></section>

  <h2 class="section-title">球员名单</h2>
  <div id="players" class="table-wrap"></div>

  <h2 class="section-title">相关比赛</h2>
  <div id="matches" class="table-wrap"></div>
</main>

<script src="/common.js"></script>
<script>
const teamId = Number(queryParam("id"));

async function loadPage() {
  const notice = document.getElementById("notice");
  if (!teamId) {
    showNotice(notice, "缺少球队ID", "error");
    return;
  }
  try {
    const [detail, players, matches] = await Promise.all([
      api(`/teams/${teamId}`),
      api(`/teams/${teamId}/players`),
      api(`/teams/${teamId}/matches`),
    ]);

    const t = detail.team;
    document.title = `${t.team_name} - 球队主页`;
    document.getElementById("teamInfo").innerHTML = `
      <h1 class="page-title">${escapeHtml(t.team_name)}</h1>
      <p>城市：${escapeHtml(t.city)}</p>
      <p>主教练：${escapeHtml(t.coach_name)}</p>
    `;

    const s = detail.standing;
    document.getElementById("standing").innerHTML = s ? `
      <div class="stat-grid">
        <div class="stat">排名<strong>${s.rank_no}</strong></div>
        <div class="stat">场次<strong>${s.played}</strong></div>
        <div class="stat">胜<strong>${s.win}</strong></div>
        <div class="stat">平<strong>${s.draw}</strong></div>
        <div class="stat">负<strong>${s.loss}</strong></div>
        <div class="stat">净胜球<strong>${s.goal_diff}</strong></div>
        <div class="stat">积分<strong>${s.points}</strong></div>
      </div>
    ` : '<p>暂无积分数据。</p>';

    document.getElementById("players").innerHTML = `
      <table>
        <thead><tr><th>号码</th><th>姓名</th><th>位置</th></tr></thead>
        <tbody>
          ${players.map(p => `
            <tr>
              <td>${p.number}</td>
              <td>${escapeHtml(p.player_name)}</td>
              <td>${escapeHtml(p.position)}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;

    document.getElementById("matches").innerHTML = `
      <table>
        <thead>
          <tr><th>轮次</th><th>比赛时间</th><th>主队</th><th>比分</th><th>客队</th><th>状态</th><th>详情</th></tr>
        </thead>
        <tbody>
          ${matches.map(m => `
            <tr>
              <td>${m.round_no}</td>
              <td>${formatDate(m.match_date)}</td>
              <td>${escapeHtml(m.home_team_name)}</td>
              <td><strong>${m.status === "scheduled" ? "vs" : `${m.home_score} : ${m.away_score}`}</strong></td>
              <td>${escapeHtml(m.away_team_name)}</td>
              <td>${statusBadge(m.status)}</td>
              <td><a href="/match_detail.html?id=${m.match_id}">查看</a></td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  } catch (error) {
    showNotice(notice, error.message, "error");
  }
}
loadPage();
</script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>球员统计</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="nav">
  <a class="brand" href="/index.html">英超赛事信息管理系统</a>
  <a href="/index.html">球队</a>
  <a href="/players.html">球员</a>
  <a href="/matches.html">赛程赛果</a>
  <a href="/standings.html">积分榜</a>
  <a href="/scorers.html">射手榜</a>
  <a href="/player_stats.html">球员统计</a>
</nav>
<main class="container">
  <h1 class="page-title">球员赛季统计</h1>
  <div class="toolbar card">
    <div class="field grow">
      <label>球员姓名</label>
      <input id="q" placeholder="输入姓名">
    </div>
    <div class="field">
      <label>球队</label>
      <select id="team"><option value="">全部球队</option></select>
    </div>
    <button id="search">查询</button>
  </div>
  <div id="notice"></div>
  <div id="table" class="table-wrap"></div>
</main>
<script src="/common.js"></script>
<script>
async function initTeams() {
  const teams = await api("/teams");
  document.getElementById("team").innerHTML += teams.map(
    t => `<option value="${t.team_id}">${escapeHtml(t.team_name)}</option>`
  ).join("");
}

async function loadStats() {
  const params = new URLSearchParams();
  const q = document.getElementById("q").value.trim();
  const team = document.getElementById("team").value;
  if (q) params.set("q", q);
  if (team) params.set("team_id", team);

  try {
    const rows = await api(`/player-stats?${params.toString()}`);
    document.getElementById("table").innerHTML = `
      <table>
        <thead>
          <tr>
            <th>球员</th><th>球队</th><th>位置</th><th>出场</th>
            <th>进球</th><th>助攻</th><th>黄牌</th><th>红牌</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td>${escapeHtml(r.player_name)}（${r.number}）</td>
              <td>${escapeHtml(r.team_name)}</td>
              <td>${escapeHtml(r.position)}</td>
              <td>${r.appearances}</td>
              <td>${r.goals}</td>
              <td>${r.assists}</td>
              <td>${r.yellow_cards}</td>
              <td>${r.red_cards}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  } catch (error) {
    showNotice(document.getElementById("notice"), error.message, "error");
  }
}

document.getElementById("search").addEventListener("click", loadStats);
Promise.resolve(initTeams()).then(loadStats);
</script>
</body>
</html>

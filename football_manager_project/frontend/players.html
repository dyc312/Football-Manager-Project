<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>球员查询</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="nav">
  <a class="brand" href="/index.html">英超赛事信息管理系统</a>
  <a href="/index.html">球队</a>
  <a href="/players.html">球员</a>
  <a href="/matches.html">赛程赛果</a>
  <a href="/standings.html">积分榜</a>
  <a href="/scorers.html">射手榜</a>
  <a href="/player_stats.html">球员统计</a>
</nav>
<main class="container">
  <h1 class="page-title">球员查询</h1>
  <div class="toolbar card">
    <div class="field grow">
      <label>姓名</label>
      <input id="q" placeholder="输入球员姓名">
    </div>
    <div class="field">
      <label>球队</label>
      <select id="team"><option value="">全部球队</option></select>
    </div>
    <div class="field">
      <label>号码</label>
      <input id="number" type="number" min="1" max="99">
    </div>
    <div class="field">
      <label>位置</label>
      <select id="position">
        <option value="">全部位置</option>
        <option value="Goalkeeper">门将</option>
        <option value="Defender">后卫</option>
        <option value="Midfielder">中场</option>
        <option value="Forward">前锋</option>
      </select>
    </div>
    <button id="search">查询</button>
  </div>
  <div id="notice"></div>
  <div id="table" class="table-wrap"></div>
</main>

<script src="/common.js"></script>
<script>
async function initTeams() {
  const teams = await api("/teams");
  document.getElementById("team").innerHTML += teams.map(
    t => `<option value="${t.team_id}">${escapeHtml(t.team_name)}</option>`
  ).join("");
}

async function loadPlayers() {
  const params = new URLSearchParams();
  for (const id of ["q", "team", "number", "position"]) {
    const value = document.getElementById(id).value.trim();
    if (!value) continue;
    params.set(id === "team" ? "team_id" : id, value);
  }
  try {
    const rows = await api(`/players?${params.toString()}`);
    document.getElementById("table").innerHTML = `
      <table>
        <thead><tr><th>球队</th><th>号码</th><th>姓名</th><th>位置</th></tr></thead>
        <tbody>
          ${rows.map(p => `
            <tr>
              <td><a href="/team_detail.html?id=${p.team_id}">${escapeHtml(p.team_name)}</a></td>
              <td>${p.number}</td>
              <td>${escapeHtml(p.player_name)}</td>
              <td>${escapeHtml(p.position)}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
    document.getElementById("notice").innerHTML = rows.length ? "" :
      '<div class="notice info">没有符合条件的球员。</div>';
  } catch (error) {
    showNotice(document.getElementById("notice"), error.message, "error");
  }
}

document.getElementById("search").addEventListener("click", loadPlayers);
Promise.resolve(initTeams()).then(loadPlayers);
</script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>参赛球队</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="nav">
  <a class="brand" href="/index.html">英超赛事信息管理系统</a>
  <a href="/index.html">球队</a>
  <a href="/players.html">球员</a>
  <a href="/matches.html">赛程赛果</a>
  <a href="/standings.html">积分榜</a>
  <a href="/scorers.html">射手榜</a>
  <a href="/player_stats.html">球员统计</a>
</nav>
<main class="container">
  <h1 class="page-title">参赛球队</h1>
  <p class="subtitle">课程演示数据：2025—2026赛季英超部分球队</p>

  <div class="toolbar card">
    <div class="field grow">
      <label for="teamSearch">球队名称或城市</label>
      <input id="teamSearch" placeholder="输入关键词">
    </div>
    <button id="searchButton">查询</button>
  </div>

  <div id="notice"></div>
  <div id="teamGrid" class="grid cards"></div>
</main>

<script src="/common.js"></script>
<script>
async function loadTeams() {
  const notice = document.getElementById("notice");
  const grid = document.getElementById("teamGrid");
  try {
    const q = document.getElementById("teamSearch").value.trim();
    const rows = await api(`/teams?q=${encodeURIComponent(q)}`);
    grid.innerHTML = rows.map(team => `
      <article class="card team-card" onclick="location.href='/team_detail.html?id=${team.team_id}'">
        <h3>${escapeHtml(team.team_name)}</h3>
        <p>📍 ${escapeHtml(team.city)}</p>
        <p>主教练：${escapeHtml(team.coach_name)}</p>
        <span class="small">点击查看球队主页</span>
      </article>
    `).join("");
    if (!rows.length) showNotice(notice, "没有符合条件的球队", "info");
    else notice.innerHTML = "";
  } catch (error) {
    showNotice(notice, error.message, "error");
  }
}

document.getElementById("searchButton").addEventListener("click", loadTeams);
document.getElementById("teamSearch").addEventListener("keydown", e => {
  if (e.key === "Enter") loadTeams();
});
loadTeams();
</script>
</body>
</html>

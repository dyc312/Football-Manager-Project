<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>射手榜</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="nav">
  <a class="brand" href="/index.html">英超赛事信息管理系统</a>
  <a href="/index.html">球队</a>
  <a href="/players.html">球员</a>
  <a href="/matches.html">赛程赛果</a>
  <a href="/standings.html">积分榜</a>
  <a href="/scorers.html">射手榜</a>
  <a href="/player_stats.html">球员统计</a>
</nav>
<main class="container">
  <h1 class="page-title">射手榜</h1>
  <p class="subtitle">进球数相同依次比较助攻数、出场次数和姓名。</p>
  <div id="notice"></div>
  <div id="table" class="table-wrap"></div>
</main>
<script src="/common.js"></script>
<script>
async function loadScorers() {
  try {
    const rows = await api("/scorers");
    document.getElementById("table").innerHTML = `
      <table>
        <thead>
          <tr><th>排名</th><th>球员</th><th>球队</th><th>出场</th><th>进球</th><th>助攻</th></tr>
        </thead>
        <tbody>
          ${rows.map((r, i) => `
            <tr class="${i < 3 ? `rank-${i + 1}` : ""}">
              <td>${r.rank_no}</td>
              <td><strong>${escapeHtml(r.player_name)}</strong></td>
              <td>${escapeHtml(r.team_name)}</td>
              <td>${r.appearances}</td>
              <td><strong>${r.goals}</strong></td>
              <td>${r.assists}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  } catch (error) {
    showNotice(document.getElementById("notice"), error.message, "error");
  }
}
loadScorers();
</script>
</body>
</html>
